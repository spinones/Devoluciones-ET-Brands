<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Devoluciones ET Brands</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="32x32" href="icon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<meta name="theme-color" content="#E94D1A">
<style>
  :root{
    --naranja:#E94D1A; --gris:#878785; --fondo:#f4f4f2; --texto:#26251f;
    --ok:#1d9e75; --warn:#ba7517; --err:#c0392b; --card:#ffffff; --borde:#dcdad2;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,Segoe UI,Roboto,sans-serif;background:var(--fondo);color:var(--texto);}

  /* ---- Estructura general: sidebar (desktop) + contenido ---- */
  .app-shell{display:flex;min-height:100vh;}
  .sidebar{
    width:230px;background:#fff;border-right:1px solid var(--borde);
    position:fixed;top:0;bottom:0;left:0;display:flex;flex-direction:column;z-index:20;
  }
  .sidebar .brand{display:flex;align-items:center;gap:10px;padding:18px 18px 14px;border-bottom:1px solid var(--borde);}
  .sidebar .brand img{width:30px;height:30px;border-radius:8px;}
  .sidebar .brand span{font-weight:700;font-size:14px;line-height:1.2;}
  .sidebar nav{flex:1;padding:14px 10px;display:flex;flex-direction:column;gap:3px;}
  .sidebar nav button{
    display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:9px;border:none;
    background:none;text-align:left;font-size:14px;font-weight:600;color:var(--gris);cursor:pointer;width:100%;
  }
  .sidebar nav button svg{width:19px;height:19px;flex-shrink:0;}
  .sidebar nav button:hover{background:#f4f4f2;}
  .sidebar nav button.activo{background:linear-gradient(90deg,#fdece3,#fff5f0);color:var(--naranja);}
  .sidebar .pie-sidebar{padding:14px 18px;border-top:1px solid var(--borde);font-size:12px;color:var(--gris);}
  .sidebar .pie-sidebar a{color:var(--gris);text-decoration:none;}
  .sidebar .pie-sidebar b{color:var(--texto);display:block;font-size:13px;margin-bottom:2px;}

  .main-wrap{flex:1;margin-left:230px;min-width:0;}
  header{
    background:var(--naranja);color:#fff;padding:14px 22px;display:flex;justify-content:space-between;
    align-items:center;position:sticky;top:0;z-index:10;
  }
  header h1{font-size:16px;margin:0;font-weight:600;}
  header .user{font-size:12px;opacity:.95;}
  header .user a{color:#fff;}
  main{padding:22px;max-width:1400px;margin:0 auto;padding-bottom:90px;}

  .card{background:var(--card);border:1px solid var(--borde);border-radius:12px;padding:16px;margin-bottom:14px;}
  .btn{display:block;width:100%;padding:14px;border:none;border-radius:8px;background:var(--naranja);color:#fff;font-size:15px;font-weight:600;margin-bottom:10px;cursor:pointer;}
  .btn.secundario{background:#fff;color:var(--naranja);border:2px solid var(--naranja);}
  .btn.gris{background:var(--gris);}
  input,select{width:100%;padding:12px;border:1px solid var(--borde);border-radius:8px;font-size:15px;margin-bottom:10px;}
  label{font-size:12px;color:var(--gris);display:block;margin-bottom:4px;font-weight:600;}
  .fila-orden{border:1px solid var(--borde);border-radius:8px;padding:10px 12px;margin-bottom:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
  .fila-orden:hover{border-color:var(--naranja);}
  .fila-orden .info b{display:block;font-size:14px;}
  .fila-orden .info span{font-size:12px;color:var(--gris);}
  .pill{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600;}
  .pill.pend{background:#faeeda;color:var(--warn);}
  .pill.ok{background:#eaf3de;color:var(--ok);}
  .pill.cerrado{background:#e1f5ee;color:var(--ok);}
  .tabs{display:flex;gap:8px;margin-bottom:14px;}
  .tabs button{flex:1;padding:10px;border-radius:8px;border:1px solid var(--borde);background:#fff;font-weight:600;font-size:13px;cursor:pointer;}
  .tabs button.activo{background:var(--naranja);color:#fff;border-color:var(--naranja);}
  #lector{width:100%;border-radius:8px;overflow:hidden;margin-bottom:10px;max-width:420px;}
  .oculto{display:none !important;}
  .msg{padding:10px;border-radius:8px;font-size:13px;margin-bottom:10px;}
  .msg.err{background:#fcebeb;color:var(--err);}
  .msg.ok{background:#eaf3de;color:var(--ok);}
  .top-bar{display:flex;gap:8px;margin-bottom:10px;}
  .top-bar select, .top-bar input{margin-bottom:0;}

  /* ---- Barra inferior: solo se ve en celular ---- */
  nav.bottom{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--borde);display:flex;z-index:20;}
  nav.bottom button{flex:1;padding:10px 4px;background:none;border:none;font-size:11px;font-weight:600;color:var(--gris);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;}
  nav.bottom button svg{width:20px;height:20px;}
  nav.bottom button.activo{color:var(--naranja);}

  .kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:14px;}
  .kpi{background:var(--card);border:1px solid var(--borde);border-radius:12px;padding:16px;text-align:center;}
  .kpi .num{font-size:28px;font-weight:700;color:#E94D1A;display:block;}
  .kpi .lbl{font-size:12px;color:var(--gris);}
  .filtros-reporte{display:flex;flex-wrap:wrap;gap:10px;}
  .filtros-reporte > div{flex:1;min-width:150px;}
  .filtros-reporte label{margin-bottom:2px;}
  .filtros-reporte input, .filtros-reporte select{margin-bottom:0;}
  table.tabla-reporte{width:100%;border-collapse:collapse;font-size:13px;}
  table.tabla-reporte th{text-align:left;padding:8px 6px;border-bottom:2px solid var(--borde);color:var(--gris);position:sticky;top:0;background:#fff;}
  table.tabla-reporte td{padding:8px 6px;border-bottom:1px solid #eee;white-space:nowrap;}
  .tabla-scroll{overflow-x:auto;max-height:420px;overflow-y:auto;}
  .grid-charts{display:grid;grid-template-columns:1fr;gap:14px;}
  .grid-2{display:grid;grid-template-columns:1fr;gap:14px;}

  /* ---- Desktop: se activa el sidebar, se oculta la barra inferior, y las grillas se expanden ---- */
  @media (min-width:860px){
    nav.bottom{display:none;}
    .kpis{grid-template-columns:repeat(4,1fr);}
    .grid-charts{grid-template-columns:1.3fr 1fr;}
    .grid-2{grid-template-columns:1fr 1fr;}
  }
  @media (max-width:859px){
    .sidebar{display:none;}
    .main-wrap{margin-left:0;}
    main{padding:14px;max-width:520px;}
  }
</style>
</head>
<body>

<div id="app"></div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<script>
/* ================== CONFIGURACION ================== */
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxGTmOzuslpDP2U9k_luyANTyAa_EhGxZ0x-rtyoimFYiNE-kcDqXvoelh3au-ThXhI/exec';

/* ================== ESTADO ================== */
let sesion = null;      // {usuario, rol, nombre}
let dataCache = null;   // {devoluciones, catalogo, usuarios}
let pantalla = 'login';
let contextoRecepcion = { ean:'', sku:'', ordenSeleccionada:null };

/* ================== UTILIDADES ================== */
async function sha256(texto){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(texto));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function llamarBackend(payload){
  const res = await fetch(APPS_SCRIPT_URL, {
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify(payload)
  });
  return res.json();
}

async function cargarDatos(){
  const res = await fetch(APPS_SCRIPT_URL);
  dataCache = await res.json();
  aplicarMediacionesProfitGuard();
  sincronizarMediacionesConSheet(); // no se espera (fire and forget), no debe bloquear la pantalla
}

// Cruza lo que trae ProfitGuard (status=in_mediation, una linea por SKU) con la planilla local.
// Si una orden de ProfitGuard no existe en la planilla, no se pierde: se guarda
// en dataCache.mediacionesSinMatch para que se pueda revisar/registrar a mano o desde "Recibir".
function aplicarMediacionesProfitGuard(){
  const mediaciones = dataCache.mediacionesProfitGuard || [];
  const ordenesYaEnPlanilla = new Set();

  mediaciones.forEach(m=>{
    const fila = dataCache.devoluciones.find(d => String(d['Numero de orden']).trim() === m.numeroDeOrden.trim());
    if(fila){
      ordenesYaEnPlanilla.add(m.numeroDeOrden.trim());
      if(fila['En mediacion'] !== 'Si'){
        fila['En mediacion'] = 'Si';
        fila['_mediacionAutoDetectada'] = true;
      }
    }
  });

  // sinMatch: una entrada por orden+SKU que no existe todavia en la planilla,
  // para poder ofrecerla directo en la pantalla de Recibir.
  dataCache.mediacionesSinMatch = mediaciones.filter(m => !ordenesYaEnPlanilla.has(m.numeroDeOrden.trim()));
}

// Guarda en la planilla, en segundo plano, las mediaciones que la API detectó
// pero que la planilla todavia no tenia marcadas. Asi la próxima vez que alguien
// abra la app (o revise la planilla directo) ya queda registrado, sin que dependa
// de que alguien entre justo a la pantalla de Mediación.
async function sincronizarMediacionesConSheet(){
  const pendientes = dataCache.devoluciones.filter(d => d._mediacionAutoDetectada);
  for(const fila of pendientes){
    try{
      await llamarBackend({action:'actualizar', data:{ _row: fila._row, 'En mediacion': 'Si' }});
      delete fila._mediacionAutoDetectada;
    }catch(err){ /* si falla, se reintenta la próxima vez que se abra la app */ }
  }
}

const ESTADOS_GESTION = [
  'Pendiente recepcion','Recibido','Evaluado',
  'Reingresado a stock','Enviado a reacondicionar','Dado de baja','Cerrado'
];

/* ================== RENDER PRINCIPAL ================== */
const ICONOS_NAV = {
  home: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/><path d="M9 20v-7h6v7"/></svg>`,
  recibir: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="18" height="12" rx="2"/><path d="M8 8V6a2 2 0 012-2h4a2 2 0 012 2v2"/><path d="M3 12h18"/></svg>`,
  gestionar: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="4" width="14" height="17" rx="2"/><path d="M9 9h6M9 13h6M9 17h4"/></svg>`,
  reportes: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20V11M12 20V4M20 20v-7"/><path d="M2 20h20"/></svg>`,
  usuarios: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3.2"/><path d="M2.5 20c0-3.3 2.9-5.5 6.5-5.5s6.5 2.2 6.5 5.5"/><circle cx="17.5" cy="8.3" r="2.4"/><path d="M17 14.8c2.7.3 4.5 2 4.5 4.9"/></svg>`,
  consultar: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="10.5" cy="10.5" r="6.5"/><path d="M20 20l-4.8-4.8"/></svg>`
};

function itemsNav(){
  const items = [
    { id:'home', label:'Inicio' },
    { id:'recibir', label:'Recibir' },
    { id:'gestionar', label:'Pendientes' },
    { id:'reportes', label:'Reportes' },
    { id:'consultar', label:'Consultar' }
  ];
  if(sesion && sesion.rol==='admin') items.push({ id:'usuarios', label:'Usuarios' });
  return items;
}

function render(){
  const app = document.getElementById('app');
  if (pantalla === 'login') { app.innerHTML = vistaLogin(); ligarLogin(); return; }

  const items = itemsNav();

  app.innerHTML = `
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <img src="icon-32.png" alt="">
          <span>Devoluciones<br>ET Brands</span>
        </div>
        <nav>
          ${items.map(it=>`
            <button data-p="${it.id}" class="${pantalla===it.id?'activo':''}">
              ${ICONOS_NAV[it.id]}<span>${it.label}</span>
            </button>`).join('')}
        </nav>
        <div class="pie-sidebar">
          <b>${sesion.nombre}</b>
          <a href="#" id="btnCambiarClaveSide">Cambiar clave</a> · <a href="#" id="logoutSide">Salir</a>
        </div>
      </aside>

      <div class="main-wrap">
        <header>
          <h1>Devoluciones ET Brands</h1>
          <div class="user">${sesion.nombre} · <a href="#" id="btnCambiarClave">clave</a> · <a href="#" id="logout">salir</a></div>
        </header>
        <main id="main"></main>
        <nav class="bottom">
          ${items.map(it=>`
            <button data-p="${it.id}" class="${pantalla===it.id?'activo':''}">
              ${ICONOS_NAV[it.id]}<span>${it.label}</span>
            </button>`).join('')}
        </nav>
      </div>
    </div>
  `;

  const irA = (id)=>{ pantalla=id; contextoRecepcion={ean:'',sku:'',ordenSeleccionada:null}; render(); };
  const cerrarSesion = (e)=>{ e.preventDefault(); sesion=null; pantalla='login'; render(); };
  const irAClave = (e)=>{ e.preventDefault(); pantalla='cambiarClave'; render(); };

  document.getElementById('logout').onclick = cerrarSesion;
  document.getElementById('logoutSide').onclick = cerrarSesion;
  document.getElementById('btnCambiarClave').onclick = irAClave;
  document.getElementById('btnCambiarClaveSide').onclick = irAClave;
  document.querySelectorAll('.sidebar nav button, nav.bottom button').forEach(b=>{
    b.onclick = ()=> irA(b.dataset.p);
  });

  const main = document.getElementById('main');
  if (pantalla==='home') { main.innerHTML = vistaHome(); ligarHome(); }
  if (pantalla==='recibir') { main.innerHTML = vistaRecibir(); ligarRecibir(); }
  if (pantalla==='gestionar') { main.innerHTML = vistaGestionar(); ligarGestionar(); }
  if (pantalla==='reportes') { main.innerHTML = vistaReportes(); ligarReportes(); }
  if (pantalla==='consultar') { main.innerHTML = vistaConsultar(); ligarConsultar(); }
  if (pantalla==='cambiarClave') { main.innerHTML = vistaCambiarClave(); ligarCambiarClave(); }
  if (pantalla==='usuarios' && sesion.rol==='admin') { main.innerHTML = vistaUsuarios(); ligarUsuarios(); }
}

/* ================== LOGIN ================== */
function vistaLogin(){
  return `
    <main style="padding-top:60px;">
      <div class="card" style="text-align:center;">
        <img src="logo_header.png" alt="ET Brands" style="max-width:180px;margin-bottom:14px;">
        <h2 style="color:#E94D1A;margin-top:0;">Devoluciones ET Brands</h2>
        <div id="loginMsg"></div>
        <label>Usuario</label>
        <input id="loginUsuario" autocomplete="username">
        <label>Clave</label>
        <input id="loginClave" type="password" autocomplete="current-password">
        <button class="btn" id="btnLogin">Ingresar</button>
      </div>
    </main>`;
}
function ligarLogin(){
  document.getElementById('btnLogin').onclick = async ()=>{
    const usuario = document.getElementById('loginUsuario').value.trim();
    const clave = document.getElementById('loginClave').value;
    if(!usuario || !clave) return;
    const msg = document.getElementById('loginMsg');
    msg.innerHTML = '<div class="msg">Verificando...</div>';
    try{
      const hash = await sha256(clave);
      const res = await llamarBackend({action:'login', usuario, passwordHash:hash});
      if(!res.ok){ msg.innerHTML = `<div class="msg err">${res.error}</div>`; return; }
      sesion = res;
      await cargarDatos();
      pantalla = 'home';
      render();
    }catch(err){
      msg.innerHTML = `<div class="msg err">No se pudo conectar. Revisa la URL del Apps Script.</div>`;
    }
  };
}

/* ================== HOME ================== */
/* ================== HOME ================== */
function ligarHome(){
  document.getElementById('btnIrARecibir').onclick = ()=>{ pantalla='recibir'; render(); };
}
function vistaHome(){
  const devs = dataCache.devoluciones;

  // Destino final del producto: sobre TODA la planilla (historico + nuevo).
  // Es independiente de si la orden esta o no en mediacion - es la clasificacion fisica real.
  const reintegrable = devs.filter(d => d.Clasificacion === 'REINTEGRABLE').length;
  const reacondicionable = devs.filter(d => d.Clasificacion === 'REACONDICIONABLE').length;
  const merma = devs.filter(d => d.Clasificacion === 'MERMA').length;

  // Cola de trabajo: cruce entre lo que ProfitGuard reporta en mediacion AHORA
  // y si esa orden ya tiene o no una fila en la planilla (historico o nuevo).
  // Sin fila en ningun lado = pendiente de recepcion real.
  const ordenesEnMediacion = new Set((dataCache.mediacionesProfitGuard || []).map(m => m.numeroDeOrden.trim()).filter(Boolean));
  let pendienteRecepcion = 0, recibido = 0;
  const detallePendientes = [];
  ordenesEnMediacion.forEach(numOrden=>{
    const existe = devs.some(d => String(d['Numero de orden']).trim() === numOrden);
    if(existe){
      recibido++;
    } else {
      pendienteRecepcion++;
      const linea = (dataCache.mediacionesProfitGuard || []).find(m => m.numeroDeOrden.trim() === numOrden);
      if(linea) detallePendientes.push(linea);
    }
  });
  const evaluado = recibido; // mismo criterio que "Recibido": ya tiene fila registrada.
  const totalMediacion = ordenesEnMediacion.size;

  return `
    <div class="card" style="background:linear-gradient(90deg,#fff5f0,#fff);border:2px solid var(--naranja);display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;">
      <div>
        <h3 style="margin:0 0 4px;">¿Llegó una devolución?</h3>
        <p style="margin:0;font-size:12px;color:#878785;">Escanea el producto o regístralo manualmente, aunque no esté en mediación ni cancelada (ej: producto que volvió por cambio).</p>
      </div>
      <button class="btn" id="btnIrARecibir" style="width:auto;padding:12px 20px;margin-bottom:0;white-space:nowrap;">+ Registrar recepción</button>
    </div>
    <div class="card" style="border:2px solid ${pendienteRecepcion ? '#c0392b' : '#1d9e75'};">
      <h3 style="margin-top:0;">Mediación: qué falta procesar</h3>
      <p style="font-size:28px;margin:0;font-weight:700;color:${pendienteRecepcion ? '#c0392b' : '#1d9e75'};">${pendienteRecepcion}</p>
      <p style="margin:0;color:#878785;font-size:13px;">de ${totalMediacion} órdenes en mediación, sin ninguna fila registrada todavía</p>
      ${detallePendientes.length ? `
      <div style="margin-top:10px;border-top:1px solid #eee;padding-top:8px;">
        ${detallePendientes.map(m=>`
          <div style="display:flex;justify-content:space-between;padding:4px 0;font-size:12px;">
            <span>${m.numeroDeOrden} · SKU ${m.sku||'?'}</span><span style="color:#878785;">${m.motivo === 'cancelada_con_retorno' ? 'cancelada' : 'mediación'} · ${m.marketplace||''}</span>
          </div>`).join('')}
      </div>` : ''}
      <div style="display:flex;justify-content:space-between;padding:6px 0;border-top:1px solid #eee;font-size:13px;margin-top:10px;">
        <span>Pendiente recepción</span><b>${pendienteRecepcion}</b>
      </div>
      <div style="display:flex;justify-content:space-between;padding:6px 0;border-top:1px solid #eee;font-size:13px;">
        <span>Recibido (ya registrado)</span><b>${recibido}</b>
      </div>
      <div style="display:flex;justify-content:space-between;padding:6px 0;border-top:1px solid #eee;font-size:13px;">
        <span>Evaluado (ya registrado)</span><b>${evaluado}</b>
      </div>
    </div>
    <div class="card">
      <h3 style="margin-top:0;">Destino final del producto</h3>
      <p style="font-size:11px;color:#878785;margin-top:-6px;">Histórico + nuevo, sin importar si estuvo en mediación.</p>
      <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #eee;font-size:13px;">
        <span>Reingresado a stock (Reintegrable)</span><b>${reintegrable}</b>
      </div>
      <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #eee;font-size:13px;">
        <span>Enviado a reacondicionar (Reacondicionable)</span><b>${reacondicionable}</b>
      </div>
      <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #eee;font-size:13px;">
        <span>Dado de baja (Merma)</span><b>${merma}</b>
      </div>
    </div>
  `;
}

/* ================== RECIBIR (escaneo) ================== */
function vistaRecibir(){
  return `
    <div class="card">
      <h3 style="margin-top:0;">Escanear EAN</h3>
      <div id="lector"></div>
      <input id="eanManual" placeholder="o escribe el EAN manualmente">
      <button class="btn secundario" id="btnBuscarEan">Buscar</button>
      <div id="resultadoRecibir"></div>
    </div>
    <div class="card" style="border:2px dashed var(--borde);">
      <h4 style="margin-top:0;">¿No la encuentra el escaneo?</h4>
      <p style="font-size:12px;color:#878785;margin-top:-6px;">Para casos que no van a aparecer en el cruce automático — por ejemplo, cuando el producto vuelve porque se envió cambiado.</p>
      <button class="btn secundario" id="btnRegistroManualDirecto">Registrar manualmente por SKU</button>

let lectorQR = null;
function ligarRecibir(){
  const div = document.getElementById('lector');
  lectorQR = new Html5Qrcode('lector');

  // Intenta primero pedir directamente la camara trasera (environment).
  lectorQR.start({ facingMode: 'environment' }, {fps:10, qrbox:220}, (texto)=>{
    lectorQR.stop();
    div.innerHTML = '';
    procesarEAN(texto);
  }).catch(()=>{
    // Si el navegador no soporta el constraint de facingMode, cae aca:
    // busca entre las camaras disponibles una que se llame "back"/"trasera",
    // y si no encuentra ninguna, usa la ultima de la lista (normalmente la trasera
    // en celulares con 2 camaras: la 0 es frontal, la 1+ son traseras).
    Html5Qrcode.getCameras().then(cams=>{
      if(!cams || !cams.length){
        div.innerHTML = '<p style="font-size:12px;color:#878785;">Sin camara detectada, usa el campo manual.</p>';
        return;
      }
      const trasera = cams.find(c => /back|trasera|rear|environment/i.test(c.label)) || cams[cams.length-1];
      lectorQR.start(trasera.id, {fps:10, qrbox:220}, (texto)=>{
        lectorQR.stop();
        div.innerHTML = '';
        procesarEAN(texto);
      }).catch(()=>{
        div.innerHTML = '<p style="font-size:12px;color:#878785;">Camara no disponible, usa el campo manual.</p>';
      });
    }).catch(()=>{
      div.innerHTML = '<p style="font-size:12px;color:#878785;">Sin camara detectada, usa el campo manual.</p>';
    });
  });

  document.getElementById('btnBuscarEan').onclick = ()=>{
    const ean = document.getElementById('eanManual').value.trim();
    if(ean) procesarEAN(ean);
  };

  document.getElementById('btnRegistroManualDirecto').onclick = ()=>{
    const cont = document.getElementById('formManualDirecto');
    cont.innerHTML = `
      <label>SKU</label>
      <input id="skuManualDirecto">
      <button class="btn" id="btnContinuarManualDirecto">Continuar</button>
    `;
    document.getElementById('btnContinuarManualDirecto').onclick = ()=>{
      const sku = document.getElementById('skuManualDirecto').value.trim();
      if(!sku) return;
      document.getElementById('resultadoRecibir').scrollIntoView({behavior:'smooth'});
      formularioRecepcion(null, sku);
    };
  };
}

function buscarEnCatalogo(ean){
  const eanLimpio = String(ean).trim();
  // Match exacto primero.
  let entrada = dataCache.catalogo.find(c => String(c.EAN).trim() === eanLimpio);
  if(entrada) return entrada;
  // Algunos lectores leen un EAN-13 que empieza en 0 como si fuera UPC-A de 12 digitos,
  // y se comen el cero inicial. Probamos agregandolo.
  entrada = dataCache.catalogo.find(c => String(c.EAN).trim() === '0'+eanLimpio);
  if(entrada) return entrada;
  // Caso inverso: que el catalogo tenga el codigo sin el cero y el escaneo lo traiga con el.
  if(eanLimpio.startsWith('0')){
    entrada = dataCache.catalogo.find(c => String(c.EAN).trim() === eanLimpio.slice(1));
    if(entrada) return entrada;
  }
  return null;
}

function procesarEAN(ean){
  contextoRecepcion.ean = ean;
  const entradaCatalogo = buscarEnCatalogo(ean);
  const cont = document.getElementById('resultadoRecibir');

  if(!entradaCatalogo){
    cont.innerHTML = `
      <div class="msg err">EAN "${ean}" no está en el catálogo.</div>
      <label>Ingresa el SKU manualmente</label>
      <input id="skuManual">
      <button class="btn" id="btnUsarSkuManual">Continuar</button>
    `;
    document.getElementById('btnUsarSkuManual').onclick = ()=>{
      const sku = document.getElementById('skuManual').value.trim();
      if(sku){ contextoRecepcion.sku = sku; mostrarOrdenesPendientes(sku); }
    };
    return;
  }
  contextoRecepcion.sku = entradaCatalogo.SKU;
  mostrarOrdenesPendientes(entradaCatalogo.SKU, entradaCatalogo['Nombre producto']);
}

function mostrarOrdenesPendientes(sku, nombreProducto){
  const cont = document.getElementById('resultadoRecibir');
  // Fuente unica de "que hay que procesar": las ordenes en mediacion en vivo de ProfitGuard.
  // La planilla ya NO se usa para decidir que esta pendiente - eso era el historico de lo
  // ya procesado. La planilla solo se consulta para ver si esta orden ya tiene una fila
  // (para continuar/actualizarla) o si hay que crear una nueva.
  const mediacionesSku = (dataCache.mediacionesProfitGuard || []).filter(m =>
    String(m.sku).trim().toUpperCase() === String(sku).trim().toUpperCase()
  );

  let html = `<div class="msg ok">SKU identificado: <b>${sku}</b>${nombreProducto ? ' · '+nombreProducto : ''}</div>`;

  if(mediacionesSku.length === 0){
    html += `
      <p style="font-size:13px;color:#878785;">ProfitGuard no tiene ninguna orden en mediación ni cancelada-con-retorno para este SKU en este momento.</p>
      <button class="btn secundario" id="btnCrearNueva">Registrar devolución no declarada</button>
    `;
    cont.innerHTML = html;
    document.getElementById('btnCrearNueva').onclick = ()=> formularioRecepcion(null, sku);
    return;
  }

  html += `<p style="font-size:13px;color:#878785;">Elige la orden que corresponde:</p>`;
  mediacionesSku.forEach((m, idx)=>{
    const filaExistente = dataCache.devoluciones.find(d => String(d['Numero de orden']).trim() === m.numeroDeOrden.trim());
    const yaProcesada = filaExistente && filaExistente['Estado de gestion'] && filaExistente['Estado de gestion'] !== 'Pendiente recepcion';
    const etiqueta = m.motivo === 'cancelada_con_retorno' ? 'cancelada (con retorno)' : 'en mediación';
    html += `
      <div class="fila-orden" data-mediacion-idx="${idx}" style="${yaProcesada ? 'opacity:0.55;' : 'border-color:#c0392b;'}">
        <div class="info">
          <b>${m.numeroDeOrden}</b>
          <span>${m.marketplace || 'marketplace no identificado'} · ${m.fecha} · Cant: ${m.cantidad || '?'}</span>
        </div>
        <span class="pill" style="background:${yaProcesada?'#eaf3de':'#fcebeb'};color:${yaProcesada?'#1d9e75':'#c0392b'};">${yaProcesada ? 'ya procesada' : etiqueta}</span>
      </div>`;
  });

  cont.innerHTML = html;
  cont.querySelectorAll('.fila-orden[data-mediacion-idx]').forEach(f=>{
    f.onclick = ()=>{
      const m = mediacionesSku[Number(f.dataset.mediacionIdx)];
      const filaExistente = dataCache.devoluciones.find(d => String(d['Numero de orden']).trim() === m.numeroDeOrden.trim());
      if(filaExistente){
        formularioRecepcion(filaExistente, sku);
      } else {
        // No hay fila todavia: se va a crear una nueva, con el motivo que corresponda.
        const ordenSintetica = {
          'Numero de orden': m.numeroDeOrden,
          MarketPlace: m.marketplace || 'No identificado',
          Fecha: m.fecha,
          Cantidad: m.cantidad,
          'En mediacion': m.motivo === 'en_mediacion' ? 'Si' : 'No',
          _motivo: m.motivo
        };
        formularioRecepcion(ordenSintetica, sku);
      }
    };
  });
}

function formularioRecepcion(orden, sku){
  const cont = document.getElementById('resultadoRecibir');
  const hoy = new Date().toISOString().slice(0,10);
  const enMediacion = orden && orden['En mediacion']==='Si';
  const esCanceladaConRetorno = orden && orden._motivo === 'cancelada_con_retorno';
  cont.innerHTML = `
    <div class="card" style="border:2px solid ${(enMediacion||esCanceladaConRetorno)?'#c0392b':'#E94D1A'};">
      <h4 style="margin-top:0;">${orden ? 'Orden '+orden['Numero de orden'] : 'Devolución no declarada'} · SKU ${sku}</h4>
      ${enMediacion ? `<div class="msg err">⚠ Esta orden está en mediación con el comprador (SAC la sigue por su cuenta). Aquí solo registramos la recepción física.</div>` : ''}
      ${esCanceladaConRetorno ? `<div class="msg err">⚠ Esta orden fue cancelada después de haber salido de bodega — corresponde recibirla igual que una devolución normal.</div>` : ''}
      ${!orden ? `
      <label>Número de orden</label>
      <input id="fNumeroOrden" placeholder="El que tengas: de MELI, Falabella, u otro marketplace no integrado">
      <label>Marketplace</label>
      <select id="fMarketplace">
        <option value="Falabella">Falabella</option>
        <option value="MELI">MELI</option>
        <option value="Walmart">Walmart</option>
        <option value="Paris">Paris</option>
        <option value="Ripley">Ripley</option>
        <option value="Bodega directa">Bodega directa</option>
        <option value="__otro__">Otro (escribir)</option>
      </select>
      <input id="fMarketplaceOtro" placeholder="Nombre del marketplace" class="oculto">
      ` : ''}
      <label>Cantidad recibida</label>
      <input id="fCantidad" type="number" min="1" value="${orden ? (orden.Cantidad||1) : 1}">
      <label>Especificación</label>
      <select id="fEspecificacion">
        <option>Sin Fallas</option>
        <option>Producto Dañado</option>
        <option>Producto Usado</option>
        <option>Producto Erroneo</option>
        <option>Falta de accesorios</option>
      </select>
      <label>Clasificación</label>
      <select id="fClasificacion">
        <option value="REINTEGRABLE">Reintegrable</option>
        <option value="REACONDICIONABLE">Reacondicionable</option>
        <option value="MERMA">Merma</option>
      </select>
      <label>Estado de gestión</label>
      <select id="fEstadoGestion">
        <option value="Recibido">Recibido</option>
        <option value="Evaluado">Evaluado</option>
      </select>
      <button class="btn" id="btnGuardarRecepcion">Guardar recepción</button>
      <div id="msgGuardar"></div>
    </div>
  `;

  if(!orden){
    document.getElementById('fMarketplace').onchange = (e)=>{
      const otroInput = document.getElementById('fMarketplaceOtro');
      if(e.target.value === '__otro__'){
        otroInput.classList.remove('oculto');
        otroInput.focus();
      } else {
        otroInput.classList.add('oculto');
      }
    };
  }

  document.getElementById('btnGuardarRecepcion').onclick = async ()=>{
    const datos = {
      Cantidad: document.getElementById('fCantidad').value,
      Especificacion: document.getElementById('fEspecificacion').value,
      Clasificacion: document.getElementById('fClasificacion').value,
      'Estado de gestion': document.getElementById('fEstadoGestion').value,
      'Fecha recepcion bodega': hoy,
      Responsable: sesion.nombre
    };
    const msg = document.getElementById('msgGuardar');
    msg.innerHTML = '<div class="msg">Guardando...</div>';
    try{
      let res;
      if(orden && orden._row){
        datos._row = orden._row;
        res = await llamarBackend({action:'actualizar', data: datos});
      } else {
        datos.SKU = sku;
        datos['Numero de orden'] = (orden && orden['Numero de orden'])
          ? orden['Numero de orden']
          : (document.getElementById('fNumeroOrden').value.trim() || ('SIN-ORDEN-'+Date.now()));
        datos.MarketPlace = (orden && orden.MarketPlace)
          ? orden.MarketPlace
          : (()=>{
              const seleccionado = document.getElementById('fMarketplace').value;
              if(seleccionado === '__otro__'){
                return document.getElementById('fMarketplaceOtro').value.trim() || 'No declarado';
              }
              return seleccionado || 'No declarado';
            })();
        datos.Fecha = (orden && orden.Fecha) || hoy;
        if(orden && orden['En mediacion']==='Si'){
          datos['En mediacion'] = 'Si';
        }
        res = await llamarBackend({action:'crear', data: datos});
      }
      if(res.ok){
        msg.innerHTML = '<div class="msg ok">Guardado correctamente.</div>';
        await cargarDatos();
        setTimeout(()=>{ pantalla='recibir'; render(); }, 900);
      } else {
        msg.innerHTML = `<div class="msg err">${res.error||'Error al guardar'}</div>`;
      }
    }catch(err){
      msg.innerHTML = '<div class="msg err">No se pudo guardar, revisa tu conexión.</div>';
    }
  };
}

    document.getElementById(id).addEventListener('change', actualizarReportes);
  });
  actualizarReportes();

function actualizarReportes(){
  const desde = document.getElementById('rDesde').value;
  const hasta = document.getElementById('rHasta').value;
  const estado = document.getElementById('rEstado').value;
  const clasificacion = document.getElementById('rClasificacion').value;
  const marketplace = document.getElementById('rMarketplace').value;

  const filtradas = dataCache.devoluciones.filter(d=>{
    const f = fechaEfectiva(d);
    if(!f) return false;
    const fechaComparable = String(f).slice(0,10);
    if(desde && fechaComparable < desde) return false;
    if(hasta && fechaComparable > hasta) return false;
    if(estado && (d['Estado de gestion']||'') !== estado) return false;
    if(clasificacion && d.Clasificacion !== clasificacion) return false;
    if(marketplace && d.MarketPlace !== marketplace) return false;
    return true;
  });

  pintarKpis(filtradas);
  pintarChartTendencia(filtradas);
  pintarChartClasificacion(filtradas);
  pintarChartMarketplace(filtradas);
  pintarTablaDetalle(filtradas);
}

function pintarKpis(filas){
  const total = filas.length;
  const reintegrable = filas.filter(d=>d.Clasificacion==='REINTEGRABLE').length;
  const reacondicionable = filas.filter(d=>d.Clasificacion==='REACONDICIONABLE').length;
  const merma = filas.filter(d=>d.Clasificacion==='MERMA').length;

  const conAmbasFechas = filas.filter(d=>d.Fecha && d['Fecha recepcion bodega']);
  let promedioDias = '—';
  if(conAmbasFechas.length){
    const suma = conAmbasFechas.reduce((acc,d)=>{
      const dias = (new Date(d['Fecha recepcion bodega']) - new Date(d.Fecha)) / 86400000;
      return acc + (isNaN(dias) ? 0 : dias);
    },0);
    promedioDias = (suma / conAmbasFechas.length).toFixed(1);
  }

  document.getElementById('kpisReporte').innerHTML = `
    <div class="kpi"><span class="num">${total}</span><span class="lbl">Procesadas en el rango</span></div>
    <div class="kpi"><span class="num">${promedioDias}</span><span class="lbl">Días promedio orden → recepción</span></div>
    <div class="kpi"><span class="num">${reintegrable}</span><span class="lbl">Reintegrables</span></div>
    <div class="kpi"><span class="num">${reacondicionable + merma}</span><span class="lbl">Reacondicionables + Merma</span></div>
  `;
}

function pintarChartTendencia(filas){
  const porDia = {};
  filas.forEach(d=>{
    const f = String(fechaEfectiva(d)).slice(0,10);
    porDia[f] = (porDia[f]||0)+1;
  });
  const dias = Object.keys(porDia).sort();
  const valores = dias.map(d=>porDia[d]);

  const ctx = document.getElementById('chartTendencia');
  if(chartTendenciaInst) chartTendenciaInst.destroy();
  chartTendenciaInst = new Chart(ctx, {
    type: 'bar',
    data: { labels: dias, datasets: [{ label: 'Procesadas', data: valores, backgroundColor: '#E94D1A' }] },
    options: {
      responsive:true,
      plugins:{
        legend:{display:false},
        datalabels:{ anchor:'end', align:'top', color:'#26251f', font:{weight:'600', size:11} }
      },
      scales:{ x:{ticks:{maxRotation:60,minRotation:60}}, y:{beginAtZero:true} }
    }
  });
}

function pintarChartClasificacion(filas){
  const conteo = { REINTEGRABLE:0, REACONDICIONABLE:0, MERMA:0, 'Sin clasificar':0 };
  filas.forEach(d=>{
    const c = d.Clasificacion;
    if(c==='REINTEGRABLE'||c==='REACONDICIONABLE'||c==='MERMA') conteo[c]++;
    else conteo['Sin clasificar']++;
  });
  const ctx = document.getElementById('chartClasificacion');
  if(chartClasifInst) chartClasifInst.destroy();
  chartClasifInst = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: Object.keys(conteo),
      datasets: [{ data: Object.values(conteo), backgroundColor: ['#1d9e75','#ba7517','#c0392b','#878785'] }]
    },
    options: {
      responsive:true,
      plugins:{
        datalabels:{
          color:'#fff',
          font:{weight:'700', size:12},
          formatter:(valor, ctx)=>{
            if(valor <= 0) return '';
            const total = ctx.dataset.data.reduce((a,b)=>a+b,0);
            const pct = total ? Math.round((valor/total)*100) : 0;
            return `${valor} (${pct}%)`;
          }
        }
      }
    }
  });
}

function pintarChartMarketplace(filas){
  const conteo = {};
  filas.forEach(d=>{
    const m = d.MarketPlace || 'Sin identificar';
    conteo[m] = (conteo[m]||0)+1;
  });
  const etiquetas = Object.keys(conteo);
  const ctx = document.getElementById('chartMarketplace');
  if(chartMktInst) chartMktInst.destroy();
  chartMktInst = new Chart(ctx, {
    type: 'bar',
    data: { labels: etiquetas, datasets: [{ label:'Procesadas', data: etiquetas.map(e=>conteo[e]), backgroundColor:'#878785' }] },
    options: {
      responsive:true,
      indexAxis:'y',
      plugins:{
        legend:{display:false},
        datalabels:{ anchor:'end', align:'end', color:'#26251f', font:{weight:'600', size:11} }
      },
      scales:{ x:{beginAtZero:true} }
    }
  });
}

function pintarTablaDetalle(filas){
  document.getElementById('tituloDetalle').textContent = `(mostrando ${Math.min(filas.length,200)} de ${filas.length})`;
  const ordenadas = filas.slice().sort((a,b)=> new Date(fechaEfectiva(b)) - new Date(fechaEfectiva(a)));
  document.getElementById('filasDetalleReporte').innerHTML = ordenadas.slice(0,200).map(d=>`
    <tr>
      <td>${d['Numero de orden']}</td>
      <td>${d.SKU}</td>
      <td>${d.MarketPlace||''}</td>
      <td>${fechaEfectiva(d)}</td>
      <td>${d.Clasificacion||''}</td>
      <td>${d['Estado de gestion']||''}</td>
      <td>${d.Responsable||''}</td>

}

function vistaCambiarClave(){
  return `
    <div class="card">
      <h3 style="margin-top:0;">Cambiar mi clave</h3>
      <div id="msgClave"></div>
      <label>Clave actual</label>
      <input id="claveActual" type="password">
      <label>Clave nueva</label>
      <input id="claveNueva1" type="password">
      <label>Repetir clave nueva</label>
      <input id="claveNueva2" type="password">
      <button class="btn" id="btnGuardarClave">Guardar</button>
      <button class="btn secundario" id="btnCancelarClave">Cancelar</button>
    </div>
  `;
}
function ligarCambiarClave(){
  document.getElementById('btnCancelarClave').onclick = ()=>{ pantalla='home'; render(); };
  document.getElementById('btnGuardarClave').onclick = async ()=>{
    const actual = document.getElementById('claveActual').value;
    const nueva1 = document.getElementById('claveNueva1').value;
    const nueva2 = document.getElementById('claveNueva2').value;
    const msg = document.getElementById('msgClave');
    if(!actual || !nueva1){ msg.innerHTML = '<div class="msg err">Completa todos los campos.</div>'; return; }
    if(nueva1 !== nueva2){ msg.innerHTML = '<div class="msg err">Las claves nuevas no coinciden.</div>'; return; }
    msg.innerHTML = '<div class="msg">Guardando...</div>';
    const claveActualHash = await sha256(actual);
    const claveNuevaHash = await sha256(nueva1);
    const res = await llamarBackend({action:'cambiarClave', data:{ usuario: sesion.usuario, claveActualHash, claveNuevaHash }});
    if(res.ok){
      msg.innerHTML = '<div class="msg ok">Clave actualizada.</div>';
      setTimeout(()=>{ pantalla='home'; render(); }, 900);
    } else {
      msg.innerHTML = `<div class="msg err">${res.error||'Error'}</div>`;
    }
  };
}

            <option value="falabella">Falabella</option>

          </select>

        <div>
          <label>Estado</label>
          <select id="cEstado">

function ligarConsultar(){
  document.getElementById('btnBuscarOrdenes').onclick = async ()=>{
    const numeroOrden = document.getElementById('cNumeroOrden').value.trim();
    const sku = document.getElementById('cSku').value.trim();
    const marketplace = document.getElementById('cMarketplace').value;
    const status = document.getElementById('cEstado').value;
    const from = document.getElementById('cDesde').value;
    const to = document.getElementById('cHasta').value;
    const msg = document.getElementById('msgConsultar');
    const resultados = document.getElementById('resultadosConsultar');

    if(!numeroOrden && !sku && !marketplace && !status && !from){
      msg.innerHTML = '<div class="msg err">Agrega al menos un filtro además de las fechas — una búsqueda totalmente abierta puede demorar varios minutos.</div>';
      return;
    }

    msg.innerHTML = '<div class="msg">Buscando en ProfitGuard, puede tardar unos segundos...</div>';
    resultados.innerHTML = '';
    const res = await llamarBackend({action:'buscarOrdenes', data:{ numeroOrden, sku, marketplace, status, from, to }});
    if(!res.ok){
      msg.innerHTML = `<div class="msg err">${res.error||'Error al buscar'}</div>`;
      return;
    }
    if(res.items.length === 0){
      msg.innerHTML = '<div class="msg err">No se encontraron órdenes con esos filtros.</div>';
      return;
    }
    msg.innerHTML = `<div class="msg ok">${res.items.length} orden(es) encontrada(s)${res.totalEncontradas > res.items.length ? ' (mostrando las primeras 30)' : ''}.</div>`;
    resultados.innerHTML = res.items.map(pintarTarjetaOrden).join('');
  };
}

const ETIQUETAS_STATUS = { paid:'Pagada', cancelled:'Cancelada', refunded:'Reembolsada', in_mediation:'En mediación' };

function pintarTarjetaOrden(o){
  const fila = dataCache.devoluciones.find(d => String(d['Numero de orden']).trim() === String(o.externalId).trim());
  const statusLabel = o.statusLabel || ETIQUETAS_STATUS[o.status] || o.status || '';
  const colorStatus = o.status==='in_mediation' ? '#c0392b' : (o.status==='cancelled' ? '#ba7517' : '#1d9e75');

  const productos = (o.orderItems||[]).map(it=>`
    <div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #f2f2f0;font-size:12px;">
      <span>${it.product ? it.product.name : ''} <b>(${it.product ? it.product.sku : ''})</b></span>
      <span>x${it.quantity} · ${it.totalPrice ? it.totalPrice.formattedValue : ''}</span>
    </div>`).join('');

  return `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:start;flex-wrap:wrap;gap:8px;">
        <div>
          <h4 style="margin:0;">Orden ${o.externalId}</h4>
          <span style="font-size:12px;color:#878785;">${o.date||''} · ${(o.integration&&o.integration.name)||'marketplace desconocido'} · ${o.logisticTypeLabel||o.logisticType||''}</span>
        </div>
        <span class="pill" style="background:${colorStatus}22;color:${colorStatus};">${statusLabel}</span>
      </div>

      <div style="margin-top:12px;">
        <b style="font-size:13px;">Productos</b>
        ${productos || '<p style="font-size:12px;color:#878785;">Sin detalle de productos.</p>'}
      </div>

      <div class="grid-2" style="margin-top:12px;">
        <div>
          <b style="font-size:13px;">Cliente</b>
          <p style="font-size:12px;color:#878785;margin:4px 0 0;">
            ${o.customer ? `${o.customer.name||''}<br>${o.customer.documentType?.toUpperCase()||''} ${o.customer.documentNumber||''}<br>${o.customer.address||''}, ${o.customer.city||''}` : 'Sin datos de cliente'}
          </p>
        </div>
        <div>
          <b style="font-size:13px;">Montos</b>
          <p style="font-size:12px;color:#878785;margin:4px 0 0;">
            Total: ${o.totalAmount ? o.totalAmount.formattedValue : '—'}<br>
            Comisión: ${o.commission ? o.commission.formattedValue : '—'}<br>
            Envío: ${o.shippingCost ? o.shippingCost.formattedValue : '—'}<br>
            Ingreso neto: ${o.realIncome ? o.realIncome.formattedValue : '—'}
          </p>
        </div>
      </div>

      <div style="margin-top:12px;border-top:1px solid #eee;padding-top:10px;">
        <b style="font-size:13px;">En nuestra bodega</b>
        ${fila ? `
          <p style="font-size:12px;color:#878785;margin:4px 0 0;">
            Estado de gestión: <b>${fila['Estado de gestion']||'—'}</b> ·
            Clasificación: <b>${fila.Clasificacion||'—'}</b> ·
            Fecha recepción: <b>${fila['Fecha recepcion bodega']||'—'}</b> ·
            Responsable: <b>${fila.Responsable||'—'}</b>
          </p>
        ` : `<p style="font-size:12px;color:#878785;margin:4px 0 0;">Todavía no hay ninguna fila registrada para esta orden en la planilla.</p>`}
      </div>
    </div>
  `;
}

function formularioUsuario(usuarioExistente){
  const cont = document.getElementById('formUsuario');
  cont.innerHTML = `
    <div class="card" style="border:2px solid #E94D1A;">
      <h4 style="margin-top:0;">${usuarioExistente ? 'Editar '+usuarioExistente.Usuario : 'Nuevo usuario'}</h4>
      <div id="msgUsuario"></div>
      <label>Usuario</label>
      <input id="fUsuario" value="${usuarioExistente ? usuarioExistente.Usuario : ''}" ${usuarioExistente ? 'disabled' : ''}>
      <label>Nombre</label>
      <input id="fNombre" value="${usuarioExistente ? (usuarioExistente.Nombre||'') : ''}">
      <label>Rol</label>
      <select id="fRol">
        <option value="operario" ${usuarioExistente && usuarioExistente.Rol==='operario' ? 'selected':''}>operario</option>
        <option value="admin" ${usuarioExistente && usuarioExistente.Rol==='admin' ? 'selected':''}>admin</option>
      </select>
      <label>${usuarioExistente ? 'Nueva clave (dejar en blanco para no cambiarla)' : 'Clave'}</label>
      <input id="fClave" type="password">
      <hr style="border:none;border-top:1px solid #eee;margin:14px 0;">
      <label>Tu clave de administrador (para autorizar este cambio)</label>
      <input id="fAdminClave" type="password">
      <button class="btn" id="btnGuardarUsuario">Guardar</button>
      <button class="btn secundario" id="btnCancelarUsuario">Cancelar</button>
    </div>
  `;
  document.getElementById('btnCancelarUsuario').onclick = ()=>{ cont.innerHTML=''; };
  document.getElementById('btnGuardarUsuario').onclick = async ()=>{
    const msg = document.getElementById('msgUsuario');
    const nuevoNombreUsuario = document.getElementById('fUsuario').value.trim();
    const nombre = document.getElementById('fNombre').value.trim();
    const rol = document.getElementById('fRol').value;
    const clave = document.getElementById('fClave').value;
    const adminClave = document.getElementById('fAdminClave').value;
    if(!adminClave){ msg.innerHTML = '<div class="msg err">Ingresa tu clave de administrador.</div>'; return; }
    if(!usuarioExistente && (!nuevoNombreUsuario || !clave)){ msg.innerHTML = '<div class="msg err">Usuario y clave son obligatorios.</div>'; return; }

    msg.innerHTML = '<div class="msg">Guardando...</div>';
    const adminClaveHash = await sha256(adminClave);
    let res;
    if(usuarioExistente){
      const cambios = { Rol: rol, Nombre: nombre };
      if(clave) cambios.PasswordHash = await sha256(clave);
      res = await llamarBackend({action:'editarUsuario', data:{ adminUsuario: sesion.usuario, adminClaveHash, usuario: usuarioExistente.Usuario, cambios }});
    } else {
      const nuevoUsuario = { Usuario: nuevoNombreUsuario, PasswordHash: await sha256(clave), Rol: rol, Nombre: nombre };
      res = await llamarBackend({action:'crearUsuario', data:{ adminUsuario: sesion.usuario, adminClaveHash, nuevoUsuario }});
    }
    if(res.ok){
      msg.innerHTML = '<div class="msg ok">Guardado.</div>';
      await cargarDatos();
      setTimeout(()=>{ pantalla='usuarios'; render(); }, 800);
    } else {
      msg.innerHTML = `<div class="msg err">${res.error||'Error'}</div>`;
    }
  };
}

  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('service-worker.js').catch(()=>{});
