<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Devoluciones ET Brands</title>
<style>
  :root{
    --naranja:#E94D1A; --gris:#878785; --fondo:#f4f4f2; --texto:#26251f;
    --ok:#1d9e75; --warn:#ba7517; --err:#c0392b; --card:#ffffff; --borde:#dcdad2;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,Segoe UI,Roboto,sans-serif;background:var(--fondo);color:var(--texto);}
  header{background:var(--naranja);color:#fff;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10;}
  header h1{font-size:16px;margin:0;font-weight:600;}
  header .user{font-size:12px;opacity:.9;}
  main{padding:14px;max-width:520px;margin:0 auto;padding-bottom:80px;}
  .card{background:var(--card);border:1px solid var(--borde);border-radius:10px;padding:14px;margin-bottom:12px;}
  .btn{display:block;width:100%;padding:14px;border:none;border-radius:8px;background:var(--naranja);color:#fff;font-size:15px;font-weight:600;margin-bottom:10px;cursor:pointer;}
  .btn.secundario{background:#fff;color:var(--naranja);border:2px solid var(--naranja);}
  .btn.gris{background:var(--gris);}
  input,select{width:100%;padding:12px;border:1px solid var(--borde);border-radius:8px;font-size:15px;margin-bottom:10px;}
  label{font-size:12px;color:var(--gris);display:block;margin-bottom:4px;font-weight:600;}
  .fila-orden{border:1px solid var(--borde);border-radius:8px;padding:10px 12px;margin-bottom:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
  .fila-orden:hover{border-color:var(--naranja);}
  .fila-orden .info b{display:block;font-size:14px;}
  .fila-orden .info span{font-size:12px;color:var(--gris);}
  .pill{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600;}
  .pill.pend{background:#faeeda;color:var(--warn);}
  .pill.ok{background:#eaf3de;color:var(--ok);}
  .pill.cerrado{background:#e1f5ee;color:var(--ok);}
  .tabs{display:flex;gap:8px;margin-bottom:14px;}
  .tabs button{flex:1;padding:10px;border-radius:8px;border:1px solid var(--borde);background:#fff;font-weight:600;font-size:13px;cursor:pointer;}
  .tabs button.activo{background:var(--naranja);color:#fff;border-color:var(--naranja);}
  #lector{width:100%;border-radius:8px;overflow:hidden;margin-bottom:10px;}
  .oculto{display:none !important;}
  .msg{padding:10px;border-radius:8px;font-size:13px;margin-bottom:10px;}
  .msg.err{background:#fcebeb;color:var(--err);}
  .msg.ok{background:#eaf3de;color:var(--ok);}
  .top-bar{display:flex;gap:8px;margin-bottom:10px;}
  .top-bar select, .top-bar input{margin-bottom:0;}
  nav.bottom{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--borde);display:flex;}
  nav.bottom button{flex:1;padding:12px;background:none;border:none;font-size:12px;font-weight:600;color:var(--gris);cursor:pointer;}
  nav.bottom button.activo{color:var(--naranja);}
</style>
</head>
<body>

<div id="app"></div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
/* ================== CONFIGURACION ================== */
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxGTmOzuslpDP2U9k_luyANTyAa_EhGxZ0x-rtyoimFYiNE-kcDqXvoelh3au-ThXhI/exec';

/* ================== ESTADO ================== */
let sesion = null;      // {usuario, rol, nombre}
let dataCache = null;   // {devoluciones, catalogo, usuarios}
let pantalla = 'login';
let contextoRecepcion = { ean:'', sku:'', ordenSeleccionada:null };

/* ================== UTILIDADES ================== */
async function sha256(texto){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(texto));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function llamarBackend(payload){
  const res = await fetch(APPS_SCRIPT_URL, {
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify(payload)
  });
  return res.json();
}

async function cargarDatos(){
  const res = await fetch(APPS_SCRIPT_URL);
  dataCache = await res.json();
}

const ESTADOS_GESTION = [
  'Pendiente recepcion','Recibido','Evaluado',
  'Reingresado a stock','Enviado a reacondicionar','Dado de baja','Cerrado'
];

/* ================== RENDER PRINCIPAL ================== */
function render(){
  const app = document.getElementById('app');
  if (pantalla === 'login') { app.innerHTML = vistaLogin(); ligarLogin(); return; }

  app.innerHTML = `
    <header>
      <h1>Devoluciones ET Brands</h1>
      <div class="user">${sesion.nombre} · <a href="#" id="logout" style="color:#fff;">salir</a></div>
    </header>
    <main id="main"></main>
    <nav class="bottom">
      <button data-p="home" class="${pantalla==='home'?'activo':''}">Inicio</button>
      <button data-p="recibir" class="${pantalla==='recibir'?'activo':''}">Recibir</button>
      <button data-p="gestionar" class="${pantalla==='gestionar'?'activo':''}">Pendientes</button>
    </nav>
  `;
  document.getElementById('logout').onclick = (e)=>{ e.preventDefault(); sesion=null; pantalla='login'; render(); };
  document.querySelectorAll('nav.bottom button').forEach(b=>{
    b.onclick = ()=>{ pantalla=b.dataset.p; contextoRecepcion={ean:'',sku:'',ordenSeleccionada:null}; render(); };
  });

  const main = document.getElementById('main');
  if (pantalla==='home') main.innerHTML = vistaHome();
  if (pantalla==='recibir') { main.innerHTML = vistaRecibir(); ligarRecibir(); }
  if (pantalla==='gestionar') { main.innerHTML = vistaGestionar(); ligarGestionar(); }
}

/* ================== LOGIN ================== */
function vistaLogin(){
  return `
    <main style="padding-top:60px;">
      <div class="card" style="text-align:center;">
        <h2 style="color:#E94D1A;">Devoluciones ET Brands</h2>
        <div id="loginMsg"></div>
        <label>Usuario</label>
        <input id="loginUsuario" autocomplete="username">
        <label>Clave</label>
        <input id="loginClave" type="password" autocomplete="current-password">
        <button class="btn" id="btnLogin">Ingresar</button>
      </div>
    </main>`;
}
function ligarLogin(){
  document.getElementById('btnLogin').onclick = async ()=>{
    const usuario = document.getElementById('loginUsuario').value.trim();
    const clave = document.getElementById('loginClave').value;
    if(!usuario || !clave) return;
    const msg = document.getElementById('loginMsg');
    msg.innerHTML = '<div class="msg">Verificando...</div>';
    try{
      const hash = await sha256(clave);
      const res = await llamarBackend({action:'login', usuario, passwordHash:hash});
      if(!res.ok){ msg.innerHTML = `<div class="msg err">${res.error}</div>`; return; }
      sesion = res;
      await cargarDatos();
      pantalla = 'home';
      render();
    }catch(err){
      msg.innerHTML = `<div class="msg err">No se pudo conectar. Revisa la URL del Apps Script.</div>`;
    }
  };
}

/* ================== HOME ================== */
function vistaHome(){
  const devs = dataCache.devoluciones;
  const conteo = {};
  ESTADOS_GESTION.forEach(e=>conteo[e]=0);
  devs.forEach(d=>{
    const e = d['Estado de gestion'] || 'Pendiente recepcion';
    conteo[e] = (conteo[e]||0)+1;
  });
  const abiertas = devs.filter(d=>(d['Estado de gestion']||'Pendiente recepcion') !== 'Cerrado').length;

  return `
    <div class="card">
      <h3 style="margin-top:0;">Resumen</h3>
      <p style="font-size:28px;margin:0;font-weight:700;color:#E94D1A;">${abiertas}</p>
      <p style="margin:0;color:#878785;font-size:13px;">devoluciones sin cerrar</p>
    </div>
    <div class="card">
      ${ESTADOS_GESTION.map(e=>`
        <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #eee;">
          <span style="font-size:13px;">${e}</span><b>${conteo[e]}</b>
        </div>`).join('')}
    </div>
  `;
}

/* ================== RECIBIR (escaneo) ================== */
function vistaRecibir(){
  return `
    <div class="card">
      <h3 style="margin-top:0;">Escanear EAN</h3>
      <div id="lector"></div>
      <input id="eanManual" placeholder="o escribe el EAN manualmente">
      <button class="btn secundario" id="btnBuscarEan">Buscar</button>
      <div id="resultadoRecibir"></div>
    </div>
  `;
}

let lectorQR = null;
function ligarRecibir(){
  const div = document.getElementById('lector');
  lectorQR = new Html5Qrcode('lector');
  Html5Qrcode.getCameras().then(cams=>{
    if(cams && cams.length){
      lectorQR.start(cams[0].id, {fps:10, qrbox:220}, (texto)=>{
        lectorQR.stop();
        div.innerHTML = '';
        procesarEAN(texto);
      }).catch(()=>{ div.innerHTML = '<p style="font-size:12px;color:#878785;">Camara no disponible, usa el campo manual.</p>'; });
    } else {
      div.innerHTML = '<p style="font-size:12px;color:#878785;">Sin camara detectada, usa el campo manual.</p>';
    }
  }).catch(()=>{
    div.innerHTML = '<p style="font-size:12px;color:#878785;">Sin camara detectada, usa el campo manual.</p>';
  });

  document.getElementById('btnBuscarEan').onclick = ()=>{
    const ean = document.getElementById('eanManual').value.trim();
    if(ean) procesarEAN(ean);
  };
}

function procesarEAN(ean){
  contextoRecepcion.ean = ean;
  const entradaCatalogo = dataCache.catalogo.find(c => String(c.EAN).trim() === String(ean).trim());
  const cont = document.getElementById('resultadoRecibir');

  if(!entradaCatalogo){
    cont.innerHTML = `
      <div class="msg err">EAN "${ean}" no está en el catálogo.</div>
      <label>Ingresa el SKU manualmente</label>
      <input id="skuManual">
      <button class="btn" id="btnUsarSkuManual">Continuar</button>
    `;
    document.getElementById('btnUsarSkuManual').onclick = ()=>{
      const sku = document.getElementById('skuManual').value.trim();
      if(sku){ contextoRecepcion.sku = sku; mostrarOrdenesPendientes(sku); }
    };
    return;
  }
  contextoRecepcion.sku = entradaCatalogo.SKU;
  mostrarOrdenesPendientes(entradaCatalogo.SKU, entradaCatalogo['Nombre producto']);
}

function mostrarOrdenesPendientes(sku, nombreProducto){
  const cont = document.getElementById('resultadoRecibir');
  const pendientes = dataCache.devoluciones.filter(d =>
    String(d.SKU).trim() === String(sku).trim() &&
    (!d['Estado de gestion'] || d['Estado de gestion'] === 'Pendiente recepcion')
  );

  let html = `<div class="msg ok">SKU identificado: <b>${sku}</b>${nombreProducto ? ' · '+nombreProducto : ''}</div>`;

  if(pendientes.length === 0){
    html += `
      <p style="font-size:13px;color:#878785;">No hay órdenes pendientes registradas para este SKU.</p>
      <button class="btn secundario" id="btnCrearNueva">Registrar devolución no declarada</button>
    `;
    cont.innerHTML = html;
    document.getElementById('btnCrearNueva').onclick = ()=> formularioRecepcion(null, sku);
    return;
  }

  html += `<p style="font-size:13px;color:#878785;">Elige la orden que corresponde:</p>`;
  pendientes
    .sort((a,b)=> new Date(b.Fecha) - new Date(a.Fecha))
    .forEach(d=>{
      html += `
        <div class="fila-orden" data-row="${d._row}">
          <div class="info">
            <b>${d['Numero de orden']}</b>
            <span>${d.MarketPlace} · ${d.Fecha} · Cant: ${d.Cantidad || '?'}</span>
          </div>
          <span class="pill pend">pendiente</span>
        </div>`;
    });
  cont.innerHTML = html;
  cont.querySelectorAll('.fila-orden').forEach(f=>{
    f.onclick = ()=>{
      const row = Number(f.dataset.row);
      const orden = dataCache.devoluciones.find(d=>d._row===row);
      formularioRecepcion(orden, sku);
    };
  });
}

function formularioRecepcion(orden, sku){
  const cont = document.getElementById('resultadoRecibir');
  const hoy = new Date().toISOString().slice(0,10);
  cont.innerHTML = `
    <div class="card" style="border:2px solid #E94D1A;">
      <h4 style="margin-top:0;">${orden ? 'Orden '+orden['Numero de orden'] : 'Devolución no declarada'} · SKU ${sku}</h4>
      <label>Cantidad recibida</label>
      <input id="fCantidad" type="number" min="1" value="${orden ? (orden.Cantidad||1) : 1}">
      <label>Especificación</label>
      <select id="fEspecificacion">
        <option>Sin Fallas</option>
        <option>Producto Dañado</option>
        <option>Producto Usado</option>
        <option>Producto Erroneo</option>
        <option>Falta de accesorios</option>
      </select>
      <label>Clasificación</label>
      <select id="fClasificacion">
        <option value="REINTEGRABLE">Reintegrable</option>
        <option value="REACONDICIONABLE">Reacondicionable</option>
        <option value="MERMA">Merma</option>
      </select>
      <label>Estado de gestión</label>
      <select id="fEstadoGestion">
        <option value="Recibido">Recibido</option>
        <option value="Evaluado">Evaluado</option>
      </select>
      <button class="btn" id="btnGuardarRecepcion">Guardar recepción</button>
      <div id="msgGuardar"></div>
    </div>
  `;

  document.getElementById('btnGuardarRecepcion').onclick = async ()=>{
    const datos = {
      Cantidad: document.getElementById('fCantidad').value,
      Especificacion: document.getElementById('fEspecificacion').value,
      Clasificacion: document.getElementById('fClasificacion').value,
      'Estado de gestion': document.getElementById('fEstadoGestion').value,
      'Fecha recepcion bodega': hoy,
      Responsable: sesion.nombre
    };
    const msg = document.getElementById('msgGuardar');
    msg.innerHTML = '<div class="msg">Guardando...</div>';
    try{
      let res;
      if(orden){
        datos._row = orden._row;
        res = await llamarBackend({action:'actualizar', data: datos});
      } else {
        datos.SKU = sku;
        datos['Numero de orden'] = 'SIN-ORDEN-'+Date.now();
        datos.MarketPlace = 'No declarado';
        datos.Fecha = hoy;
        res = await llamarBackend({action:'crear', data: datos});
      }
      if(res.ok){
        msg.innerHTML = '<div class="msg ok">Guardado correctamente.</div>';
        await cargarDatos();
        setTimeout(()=>{ pantalla='recibir'; render(); }, 900);
      } else {
        msg.innerHTML = `<div class="msg err">${res.error||'Error al guardar'}</div>`;
      }
    }catch(err){
      msg.innerHTML = '<div class="msg err">No se pudo guardar, revisa tu conexión.</div>';
    }
  };
}

/* ================== GESTIONAR PENDIENTES ================== */
function vistaGestionar(){
  return `
    <div class="top-bar">
      <select id="filtroEstado">
        <option value="">Todos los estados</option>
        ${ESTADOS_GESTION.map(e=>`<option value="${e}">${e}</option>`).join('')}
      </select>
      <input id="filtroSku" placeholder="Filtrar por SKU">
    </div>
    <div id="listaGestion"></div>
  `;
}
function ligarGestionar(){
  const pintar = ()=>{
    const filtroEstado = document.getElementById('filtroEstado').value;
    const filtroSku = document.getElementById('filtroSku').value.trim().toLowerCase();
    let filas = dataCache.devoluciones.filter(d=>{
      const estado = d['Estado de gestion'] || 'Pendiente recepcion';
      if(filtroEstado && estado !== filtroEstado) return false;
      if(filtroSku && !String(d.SKU).toLowerCase().includes(filtroSku)) return false;
      return true;
    });
    const cont = document.getElementById('listaGestion');
    if(filas.length===0){ cont.innerHTML = '<p style="color:#878785;font-size:13px;">Sin resultados.</p>'; return; }
    cont.innerHTML = filas.slice(0,100).map(d=>{
      const estado = d['Estado de gestion'] || 'Pendiente recepcion';
      const claseP = estado==='Cerrado' ? 'cerrado' : (estado==='Pendiente recepcion' ? 'pend' : 'ok');
      return `
        <div class="fila-orden" data-row="${d._row}">
          <div class="info">
            <b>${d.SKU} · ${d['Numero de orden']}</b>
            <span>${d.MarketPlace} · ${d.Fecha} · ${d.Clasificacion||''}</span>
          </div>
          <span class="pill ${claseP}">${estado}</span>
        </div>`;
    }).join('');
    cont.querySelectorAll('.fila-orden').forEach(f=>{
      f.onclick = ()=>{
        const row = Number(f.dataset.row);
        const item = dataCache.devoluciones.find(d=>d._row===row);
        abrirEdicion(item);
      };
    });
  };
  document.getElementById('filtroEstado').onchange = pintar;
  document.getElementById('filtroSku').oninput = pintar;
  pintar();
}

function abrirEdicion(item){
  const cont = document.getElementById('listaGestion');
  cont.innerHTML = `
    <div class="card" style="border:2px solid #E94D1A;">
      <h4 style="margin-top:0;">${item.SKU} · ${item['Numero de orden']}</h4>
      <label>Estado de gestión</label>
      <select id="eEstado">
        ${ESTADOS_GESTION.map(e=>`<option value="${e}" ${e===(item['Estado de gestion']||'Pendiente recepcion')?'selected':''}>${e}</option>`).join('')}
      </select>
      <label>Stock actualizado</label>
      <select id="eStock">
        <option value="No" ${item['Stock actualizado']!=='Si'?'selected':''}>No</option>
        <option value="Si" ${item['Stock actualizado']==='Si'?'selected':''}>Si</option>
      </select>
      <label>Reembolso / nota de crédito confirmado</label>
      <select id="eReembolso">
        <option value="No" ${item['Reembolso confirmado']!=='Si'?'selected':''}>No</option>
        <option value="Si" ${item['Reembolso confirmado']==='Si'?'selected':''}>Si</option>
      </select>
      <button class="btn" id="btnGuardarEdicion">Guardar cambios</button>
      <button class="btn gris" id="btnCancelarEdicion">Cancelar</button>
      <div id="msgEdicion"></div>
    </div>
  `;
  document.getElementById('btnCancelarEdicion').onclick = ()=> render();
  document.getElementById('btnGuardarEdicion').onclick = async ()=>{
    const datos = {
      _row: item._row,
      'Estado de gestion': document.getElementById('eEstado').value,
      'Stock actualizado': document.getElementById('eStock').value,
      'Reembolso confirmado': document.getElementById('eReembolso').value
    };
    const msg = document.getElementById('msgEdicion');
    msg.innerHTML = '<div class="msg">Guardando...</div>';
    const res = await llamarBackend({action:'actualizar', data: datos});
    if(res.ok){
      msg.innerHTML = '<div class="msg ok">Actualizado.</div>';
      await cargarDatos();
      setTimeout(render, 700);
    } else {
      msg.innerHTML = `<div class="msg err">${res.error||'Error'}</div>`;
    }
  };
}

/* ================== INICIO ================== */
render();
</script>
</body>
</html>
